// HUD Settings Toggle Script
// This script toggles the HUD settings popup visibility

alias toggle_hud_settings "toggle_hud_settings_on"
alias toggle_hud_settings_on "hud_settings_popup_show; alias toggle_hud_settings toggle_hud_settings_off"
alias toggle_hud_settings_off "hud_settings_popup_hide; alias toggle_hud_settings toggle_hud_settings_on"

alias hud_settings_popup_show "echo HUD Settings Shown; play UI/buttonclick.wav"
alias hud_settings_popup_hide "echo HUD Settings Hidden; play UI/buttonclickrelease.wav"

// Initial setup
toggle_hud_settings_on
