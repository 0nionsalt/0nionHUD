// HUD Settings Toggle Script
// Execute this command from console: exec hud_settings_toggle
// Or bind it to a key: bind f1 exec hud_settings_toggle

 // Toggle using the built-in MOTD panel (works in multiplayer)
 alias hud_popup_toggle "hud_popup_show"
 alias hud_popup_show "motd_show; echo HUD Settings Popup Shown; alias hud_popup_toggle hud_popup_hide"
 alias hud_popup_hide "motd_hide; echo HUD Settings Popup Hidden; alias hud_popup_toggle hud_popup_show"
 
 // Convenience alias
 alias hud_settings_force "motd_show"

echo HUD Settings Toggle Script Loaded
echo Commands:
 echo - hud_popup_toggle (toggles popup visibility)
 echo - hud_settings_force (forces popup visible)
echo Bind example: bind f1 hud_popup_toggle
