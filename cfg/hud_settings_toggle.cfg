// HUD Settings Toggle Script
// Execute this command from console: exec hud_settings_toggle
// Or bind it to a key: bind f1 exec hud_settings_toggle

alias hud_popup_toggle "hud_popup_show"
alias hud_popup_show "echo HUD Settings Popup Shown; cl_drawhud 1; alias hud_popup_toggle hud_popup_hide"
alias hud_popup_hide "echo HUD Settings Popup Hidden; cl_drawhud 0; alias hud_popup_toggle hud_popup_show"

// Alternative toggle using hud_reloadscheme
alias hud_settings_refresh "echo HUD Settings Refreshed; hud_reloadscheme"

echo HUD Settings Toggle Script Loaded
echo Commands:
echo - hud_popup_toggle (toggles popup visibility)
echo - hud_settings_refresh (reloads HUD)
echo Bind example: bind f1 hud_popup_toggle
