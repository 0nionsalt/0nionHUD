// HUD Settings Toggle Script
// Execute this command from console: exec hud_settings_toggle

alias hud_toggle "hud_show"
alias hud_show "echo HUD Settings Shown; hud_reloadscheme"
alias hud_hide "echo HUD Settings Hidden; hud_reloadscheme"

echo HUD Settings Toggle Script Loaded
echo Use: hud_toggle to show/hide HUD settings
